branding:
  # Main dashboard heading text (H1) and browser tab title.
  dashboard_title: "Performance Dashboard: Sales & Campaigns"

  # CSS color for the dashboard heading text.
  # Example: "#1f2435" or "rgb(31, 36, 53)" or color name like "navy"
  dashboard_title_color: "#1f2435"

charts:
  revenue_by_region:
    # Available options: donut, vertical_bar, horizontal_bar, pie
    # - donut: doughnut chart (default)
    # - vertical_bar: bar chart with vertical columns
    # - horizontal_bar: bar chart with horizontal bars
    # - pie: pie chart
    type: donut

    # Region color palette used by Revenue by Region chart.
    # For donut/pie: each region uses the next color in this list.
    # For vertical/horizontal bar: each region bar uses the next color in this list.
    # You can add more colors if you have more regions.
    colors:
      - "#1a7f5a"
      - "#2f6f91"
      - "#ed8d21"
      - "#b93c5d"

    #   - "red"
    #   - "blue"
    #   - "green"
    #   - "orange"

  revenue_by_segment:
    # Available options: donut, vertical_bar, horizontal_bar, pie
    # - donut: doughnut chart
    # - vertical_bar: bar chart with vertical columns
    # - horizontal_bar: bar chart with horizontal bars
    # - pie: pie chart (default)
    type: horizontal_bar

    # Segment color palette.
    # For donut/pie: each segment uses the next color in this list.
    # For vertical/horizontal bar: each segment bar uses the next color in this list.
    colors:
      - "#b93c5d"
      - "#ed8d21"
      - "#1a7f5a"
      - "#2f6f91"

  order_status:
    # Available options: donut, vertical_bar, horizontal_bar, pie
    # - donut: doughnut chart
    # - vertical_bar: bar chart with vertical columns (default)
    # - horizontal_bar: bar chart with horizontal bars
    # - pie: pie chart
    type: horizontal_bar

    # Order status color palette.
    # For donut/pie: each status uses the next color in this list.
    # For vertical/horizontal bar: each status bar uses the next color in this list.
    colors:
      - "#2f6f91"
      - "#ed8d21"
      - "#1a7f5a"
      - "#b93c5d"

  top_products_by_units:
    # Show top N products by units sold in the Top Products chart.
    # Use a positive integer (1, 2, 3, ...).
    top_n: 5

    # Bar color for the Top Products by Units chart.
    # Example: "#2f6f91" or "rgb(47, 111, 145)" or color name like "teal"
    color: "teal"
    
    # Include an "Others" bar where:
    # Others = total units of all products - units of top_n products
    include_others: true

  latest_sales_orders:
    # Number of latest rows to show in the Latest Sales Orders table.
    # Use a positive integer (1, 2, 3, ...).
    last_n_rows: 3

    # Show or hide the Latest Sales Orders table.
    show_table: true

  latest_campaigns:
    # Number of latest rows to show in the Latest Campaigns table.
    # Use a positive integer (1, 2, 3, ...).
    last_n_rows: 3

    # Show or hide the Latest Campaigns table.
    show_table: true

  revenue_trend:
    # Available options: area, line
    # - area: line with filled background
    # - line: plain line without fill
    style: area

    # CSS color for line/border (hex, rgb, rgba, hsl are all valid)
    # Example: "#1a7f5a" or "rgb(30, 130, 76)" or color name like "red"
    line_color: "#1a7f5a"

    # CSS color for area fill when style is "area"
    # Example: "rgba(26, 127, 90, 0.15)"
    area_color: "rgba(26, 127, 90, 0.15)"

  campaign_channel_performance:
    # Available options: combined, split
    # - combined: single chart with both spend and revenue bars
    # - split: two separate charts (one for spend, one for revenue)
    mode: split

    # Used only when mode is "split"
    # Available options: donut, pie, vertical_bar, horizontal_bar
    split_spend_type: donut

    # Used only when mode is "split"
    # Available options: donut, pie, vertical_bar, horizontal_bar
    split_revenue_type: horizontal_bar
